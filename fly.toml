# Configuración para desplegar en Fly.io (https://fly.io).
# Fly ofrece un volumen persistente pequeño, ideal para conservar la base de datos
# con una URL fija del tipo https://cuadrantes-seguridad.fly.dev
#
# Pasos:
#   1. Instale flyctl y ejecute:  fly launch --no-deploy   (ajusta el nombre)
#   2. Cree el volumen:           fly volumes create cuadrantes_datos --size 1
#   3. Fije la contraseña:        fly secrets set CUADRANTES_PASSWORD=su_clave
#   4. Despliegue:                fly deploy

app = "cuadrantes-seguridad"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  CUADRANTES_DB = "/data/cuadrantes.db"
  CUADRANTES_USER = "admin"

[[mounts]]
  source = "cuadrantes_datos"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
